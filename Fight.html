<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 格鬥遊戲 - 1v1 三戰兩勝</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --gold: #e2b04a;
            --text: #e0d8c8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow-y: auto;
            padding: 10px;
        }

        .game-wrapper {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 80px rgba(226, 176, 74, 0.08);
            border: 2px solid #2a2a4a;
            max-width: 960px;
            width: 100%;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .game-header h1 {
            color: var(--gold);
            font-size: 1.4em;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(226, 176, 74, 0.5);
            white-space: nowrap;
        }
        .round-indicator {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .round-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #555;
            background: #222;
            transition: all 0.3s;
        }
        .round-dot.won {
            background: #e2b04a;
            border-color: #e2b04a;
            box-shadow: 0 0 10px rgba(226, 176, 74, 0.7);
        }
        .round-dot.lost {
            background: #c0392b;
            border-color: #c0392b;
            box-shadow: 0 0 8px rgba(192, 57, 43, 0.6);
        }
        .vs-text {
            color: #aaa;
            font-weight: bold;
            font-size: 0.9em;
            margin: 0 4px;
        }

        canvas {
            display: block;
            border-radius: 8px;
            width: 100%;
            height: auto;
            background: #0a0a18;
            border: 1px solid #333;
            cursor: default;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85em;
            color: #aaa;
        }
        .info-bar .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .info-bar .controls div {
            background: #1a1a30;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .info-bar .controls strong {
            color: var(--gold);
        }
        .info-bar .mode-hint {
            color: #e2b04a;
            font-weight: bold;
            cursor: pointer;
            padding: 6px 12px;
            background: #1a1a30;
            border-radius: 6px;
            border: 1px solid #444;
            transition: all 0.2s;
        }
        .info-bar .mode-hint:hover {
            background: #2a2a40;
            border-color: #e2b04a;
        }

        @media (max-width: 700px) {
            .game-header h1 {
                font-size: 1.1em;
            }
            .info-bar {
                font-size: 0.7em;
            }
            .info-bar .controls {
                gap: 6px;
            }
            .info-bar .controls div {
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <h1>⚔ 格鬥競技 ⚔</h1>
            <div class="round-indicator" id="roundIndicator">
                <span style="color:#aaa;font-size:0.8em;">P1</span>
                <div class="round-dot" id="p1r1"></div>
                <div class="round-dot" id="p1r2"></div>
                <span class="vs-text">VS</span>
                <div class="round-dot" id="p2r1"></div>
                <div class="round-dot" id="p2r2"></div>
                <span style="color:#aaa;font-size:0.8em;">P2</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="info-bar">
            <div class="controls">
                <div><strong>P1</strong> WASD移動 | J攻擊 | K技能 | L必殺</div>
                <div><strong>P2</strong> ↑↓←→移動 | 1攻擊 | 2技能 | 3必殺</div>
            </div>
            <div class="mode-hint" id="modeToggle" title="點擊切換模式">🆚 雙人對戰模式</div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // --- Canvas 尺寸 ---
            const W = 920;
            const H = 500;
            canvas.width = W;
            canvas.height = H;

            // --- 遊戲狀態 ---
            const STATE = {
                SELECT: 'select',
                FIGHT: 'fight',
                ROUND_END: 'roundEnd',
                MATCH_END: 'matchEnd',
            };

            let gameState = STATE.SELECT;
            let p1Selection = -1;
            let p2Selection = -1;
            let isVsCPU = true; // 預設單人vs電腦
            let roundNumber = 1;
            let p1RoundWins = 0;
            let p2RoundWins = 0;
            let roundEndTimer = 0;
            let matchEndTimer = 0;
            let roundWinner = null; // 'p1' | 'p2' | null
            let matchWinner = null;
            let roundStartCountdown = 0;
            let shakeAmount = 0;
            let globalSlowMo = 0;

            // --- 角色定義 ---
            const CHARACTERS = [
                { name: '優 (Yu)', color: '#2c2c2c', accent: '#e8e8e8', desc: '瞬步·神速怪力', skillName: '瞬步·斷空',
                    ultimateName: '神速連擊' },
                { name: '里奧 (Leo)', color: '#4a4a5a', accent: '#ff4444', desc: '高壓液壓義體', skillName: '高壓爆裂刺拳',
                    ultimateName: '極速過載拳' },
                { name: '櫻 (Sakura)', color: '#1a3a5c', accent: '#4dc9f6', desc: '重力磁能柔道', skillName: '重力一本背負投',
                    ultimateName: '地獄量子引力落' },
                { name: '健 (Ken)', color: '#f5f0e8', accent: '#ffd700', desc: '等離子空手道', skillName: '離子正拳突',
                    ultimateName: '千裂光子腳' },
                { name: '龍 (Long)', color: '#8b1a1a', accent: '#00ff88', desc: '全息機械神龍', skillName: '生化猛龍出海',
                    ultimateName: '萬核朝宗' },
            ];

            // --- 輸入處理 ---
            const keys = {};
            window.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                keys[e.code] = true;
                e.preventDefault();
            });
            window.addEventListener('keyup', e => {
                keys[e.key.toLowerCase()] = false;
                keys[e.code] = false;
                e.preventDefault();
            });

            // --- 粒子系統 ---
            class Particle {
                constructor(x, y, vx, vy, life, color, size = 3, type = 'circle') {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.life = life;
                    this.maxLife = life;
                    this.color = color;
                    this.size = size;
                    this.type = type; // 'circle' | 'spark' | 'trail' | 'shockwave'
                    this.gravity = 0;
                    this.friction = 0.98;
                }
                update(dt) {
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.vy += this.gravity;
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.life -= dt;
                }
                get alpha() { return Math.max(0, this.life / this.maxLife); }
                get alive() { return this.life > 0; }
                draw(ctx) {
                    const a = this.alpha;
                    ctx.save();
                    ctx.globalAlpha = a;
                    if (this.type === 'circle') {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * a, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (this.type === 'spark') {
                        ctx.strokeStyle = this.color;
                        ctx.lineWidth = 2 * a;
                        ctx.beginPath();
                        ctx.moveTo(this.x, this.y);
                        ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
                        ctx.stroke();
                    } else if (this.type === 'trail') {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * a * 1.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * a * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (this.type === 'shockwave') {
                        ctx.strokeStyle = this.color;
                        ctx.lineWidth = 3 * a;
                        const r = this.size * (1 - a) * 3 + 5;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }
            let particles = [];

            function spawnParticles(x, y, count, color, spread = 4, life = 0.6, type = 'circle', size = 3) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * spread + spread * 0.3;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed - Math.random() * spread;
                    particles.push(new Particle(x, y, vx, vy, life + Math.random() * 0.3, color, size, type));
                }
            }

            function spawnHitSparks(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
                    const speed = Math.random() * 8 + 3;
                    particles.push(new Particle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, 0.3, color, 4,
                        'spark'));
                }
            }

            // --- 戰鬥角色類 ---
            class Fighter {
                constructor(x, y, charData, isPlayer1, isCPU = false) {
                    this.x = x;
                    this.y = y;
                    this.vx = 0;
                    this.vy = 0;
                    this.width = 44;
                    this.height = 90;
                    this.charData = charData;
                    this.isPlayer1 = isPlayer1;
                    this.isCPU = isCPU;
                    this.facingRight = isPlayer1;
                    this.grounded = true;
                    this.hp = 100;
                    this.maxHp = 100;
                    this.energy = 0;
                    this.maxEnergy = 100;

                    // 狀態
                    this.state = 'idle'; // idle | walk | jump | attack | skill | ultimate | hit | knocked | block | stunned
                    this.stateTimer = 0;
                    this.attackFrame = 0;
                    this.attackDuration = 0;
                    this.attackHit = false;
                    this.skillCooldown = 0;
                    this.ultimateCooldown = 0;
                    this.invincible = 0;
                    this.hitStun = 0;
                    this.comboCount = 0;
                    this.lastHitTime = 0;

                    // 技能特定
                    this.skillProjectile = null;
                    this.afterimageTrails = [];
                    this.specialEffectTimer = 0;
                    this.flashTimer = 0;

                    // CPU AI
                    this.aiTimer = 0;
                    this.aiAction = 'idle';
                    this.aiCooldown = 0;
                }

                get grounded() { return this._grounded; }
                set grounded(v) { this._grounded = v; }

                get rect() {
                    return {
                        x: this.x - this.width / 2,
                        y: this.y - this.height,
                        w: this.width,
                        h: this.height,
                    };
                }

                get attackRect() {
                    const r = this.rect;
                    if (this.facingRight) {
                        return { x: r.x + r.w, y: r.y + r.h * 0.2, w: 50, h: r.h * 0.5 };
                    } else {
                        return { x: r.x - 50, y: r.y + r.h * 0.2, w: 50, h: r.h * 0.5 };
                    }
                }

                get skillRect() {
                    const r = this.rect;
                    if (this.facingRight) {
                        return { x: r.x + r.w - 10, y: r.y + r.h * 0.1, w: 65, h: r.h * 0.7 };
                    } else {
                        return { x: r.x - 55, y: r.y + r.h * 0.1, w: 65, h: r.h * 0.7 };
                    }
                }

                reset(x) {
                    this.x = x;
                    this.y = H - 60;
                    this.vx = 0;
                    this.vy = 0;
                    this.hp = this.maxHp;
                    this.energy = 0;
                    this.state = 'idle';
                    this.stateTimer = 0;
                    this.attackFrame = 0;
                    this.attackHit = false;
                    this.skillCooldown = 0;
                    this.ultimateCooldown = 0;
                    this.invincible = 0;
                    this.hitStun = 0;
                    this.comboCount = 0;
                    this.skillProjectile = null;
                    this.afterimageTrails = [];
                    this.specialEffectTimer = 0;
                    this.flashTimer = 0;
                    this.grounded = true;
                }

                update(dt, opponent) {
                    // 全局減速
                    const effectiveDt = globalSlowMo > 0 ? dt * 0.15 : dt;
                    const realDt = dt;

                    if (globalSlowMo > 0) globalSlowMo = Math.max(0, globalSlowMo - realDt);
                    if (shakeAmount > 0) shakeAmount = Math.max(0, shakeAmount - realDt * 30);

                    // 冷卻
                    if (this.skillCooldown > 0) this.skillCooldown -= realDt;
                    if (this.ultimateCooldown > 0) this.ultimateCooldown -= realDt;
                    if (this.invincible > 0) this.invincible -= realDt;
                    if (this.hitStun > 0) this.hitStun -= realDt;
                    if (this.flashTimer > 0) this.flashTimer -= realDt;
                    if (this.specialEffectTimer > 0) this.specialEffectTimer -= realDt;

                    // 滯空物理
                    if (!this.grounded) {
                        this.vy += 1800 * realDt;
                        this.y += this.vy * realDt;
                        if (this.y >= H - 60) {
                            this.y = H - 60;
                            this.vy = 0;
                            this.grounded = true;
                            if (this.state === 'jump') this.state = 'idle';
                        }
                    }

                    // 水平摩擦
                    if (this.grounded && (this.state === 'idle' || this.state === 'walk')) {
                        this.vx *= 0.85;
                    }

                    // 水平移動
                    if (this.state !== 'hit' && this.state !== 'knocked' && this.hitStun <= 0) {
                        this.x += this.vx * realDt;
                    }

                    // 邊界
                    this.x = Math.max(40, Math.min(W - 40, this.x));

                    // 狀態計時
                    if (this.stateTimer > 0) {
                        this.stateTimer -= realDt;
                        if (this.stateTimer <= 0 && (this.state === 'attack' || this.state === 'skill')) {
                            this.state = 'idle';
                            this.attackHit = false;
                            this.attackFrame = 0;
                            this.skillProjectile = null;
                        }
                        if (this.stateTimer <= 0 && this.state === 'ultimate') {
                            this.state = 'idle';
                            this.attackHit = false;
                            this.attackFrame = 0;
                            this.specialEffectTimer = 0;
                        }
                        if (this.stateTimer <= 0 && this.state === 'hit') {
                            this.state = 'idle';
                            this.hitStun = 0;
                        }
                    }

                    // 攻擊幀更新
                    if (this.state === 'attack' && this.attackFrame < this.attackDuration) {
                        this.attackFrame += realDt;
                    }
                    if (this.state === 'skill' && this.attackFrame < this.attackDuration) {
                        this.attackFrame += realDt;
                    }
                    if (this.state === 'ultimate' && this.attackFrame < this.attackDuration) {
                        this.attackFrame += realDt;
                    }

                    // 殘影
                    if (this.state === 'ultimate' && this.charData.name.includes('優')) {
                        if (Math.random() < 0.4) {
                            this.afterimageTrails.push({ x: this.x, y: this.y, life: 0.25, alpha: 0.7 });
                        }
                    }
                    for (let i = this.afterimageTrails.length - 1; i >= 0; i--) {
                        this.afterimageTrails[i].life -= realDt;
                        if (this.afterimageTrails[i].life <= 0) this.afterimageTrails.splice(i, 1);
                    }

                    // 飛行道具更新
                    if (this.skillProjectile) {
                        this.skillProjectile.x += this.skillProjectile.vx * realDt;
                        this.skillProjectile.y += this.skillProjectile.vy * realDt;
                        this.skillProjectile.life -= realDt;
                        if (this.skillProjectile.life <= 0 || this.skillProjectile.x < -30 || this.skillProjectile.x > W +
                            30) {
                            this.skillProjectile = null;
                        }
                    }

                    // CPU AI
                    if (this.isCPU && this.hitStun <= 0 && this.state !== 'hit' && this.state !== 'knocked') {
                        this.updateAI(realDt, opponent);
                    }

                    // 能量衰減
                    if (this.state === 'idle' && this.energy > 0) {
                        this.energy = Math.max(0, this.energy - 0.5 * realDt);
                    }
                }

                updateAI(dt, opponent) {
                    this.aiCooldown -= dt;
                    const dx = opponent.x - this.x;
                    const dist = Math.abs(dx);
                    const facing = dx > 0;
                    this.facingRight = facing;

                    if (this.aiCooldown > 0) return;
                    this.aiCooldown = 0.15 + Math.random() * 0.3;

                    if (dist < 70 && opponent.state === 'attack' && Math.random() < 0.5) {
                        // 防禦/後退
                        this.vx = -Math.sign(dx) * 200;
                        this.state = 'walk';
                        return;
                    }

                    if (dist < 55 && Math.random() < 0.3 && this.skillCooldown <= 0) {
                        this.useSkill();
                        this.aiCooldown = 0.5;
                    } else if (dist < 50 && Math.random() < 0.4) {
                        this.attack();
                        this.aiCooldown = 0.35;
                    } else if (dist < 180 && Math.random() < 0.2 && this.energy >= 60 && this.ultimateCooldown <= 0) {
                        this.useUltimate();
                        this.aiCooldown = 0.7;
                    } else if (dist > 60) {
                        this.vx = Math.sign(dx) * (200 + Math.random() * 150);
                        this.state = 'walk';
                    } else if (Math.random() < 0.15 && this.grounded) {
                        this.jump();
                    }
                }

                jump() {
                    if (!this.grounded || this.hitStun > 0) return;
                    if (this.state === 'hit' || this.state === 'knocked') return;
                    this.vy = -650;
                    this.grounded = false;
                    this.state = 'jump';
                }

                attack() {
                    if (this.hitStun > 0) return;
                    if (this.state === 'attack' || this.state === 'skill' || this.state === 'ultimate') return;
                    if (this.state === 'hit' || this.state === 'knocked') return;
                    this.state = 'attack';
                    this.stateTimer = 0.35;
                    this.attackFrame = 0;
                    this.attackDuration = 0.35;
                    this.attackHit = false;
                    // 小突進
                    this.vx = this.facingRight ? 180 : -180;
                }

                useSkill() {
                    if (this.hitStun > 0) return;
                    if (this.skillCooldown > 0) return;
                    if (this.state === 'attack' || this.state === 'skill' || this.state === 'ultimate') return;
                    if (this.state === 'hit' || this.state === 'knocked') return;
                    this.state = 'skill';
                    this.stateTimer = 0.5;
                    this.attackFrame = 0;
                    this.attackDuration = 0.5;
                    this.attackHit = false;
                    this.skillCooldown = 2.5;
                    this.energy = Math.min(this.maxEnergy, this.energy + 8);

                    // 角色特定技能
                    const name = this.charData.name;
                    if (name.includes('優')) {
                        // 瞬步：快速前衝
                        this.vx = this.facingRight ? 600 : -600;
                        this.invincible = 0.3;
                        this.specialEffectTimer = 0.4;
                        spawnParticles(this.x, this.y, 12, '#aaa', 5, 0.4, 'trail', 2);
                    } else if (name.includes('里奧')) {
                        // 爆裂刺拳：原地多段判定
                        this.vx = this.facingRight ? 100 : -100;
                        this.specialEffectTimer = 0.45;
                        spawnParticles(this.x + (this.facingRight ? 30 : -30), this.y - 40, 15, '#ff6644', 6, 0.5,
                            'spark', 3);
                    } else if (name.includes('櫻')) {
                        // 重力摔：近身投技
                        this.vx = this.facingRight ? 250 : -250;
                        this.specialEffectTimer = 0.4;
                        spawnParticles(this.x, this.y - 20, 8, '#4dc9f6', 3, 0.5, 'circle', 4);
                    } else if (name.includes('健')) {
                        // 離子正拳突：飛行道具
                        this.skillProjectile = {
                            x: this.x + (this.facingRight ? 40 : -40),
                            y: this.y - 45,
                            vx: this.facingRight ? 500 : -500,
                            vy: 0,
                            life: 1.0,
                            color: '#ffd700',
                            size: 10,
                            damage: 12,
                        };
                        spawnParticles(this.skillProjectile.x, this.skillProjectile.y, 8, '#ffd700', 3, 0.4, 'spark', 3);
                    } else if (name.includes('龍')) {
                        // 龍氣功：貼地飛行道具
                        this.skillProjectile = {
                            x: this.x + (this.facingRight ? 40 : -40),
                            y: this.y - 20,
                            vx: this.facingRight ? 380 : -380,
                            vy: 0,
                            life: 1.2,
                            color: '#00ff88',
                            size: 14,
                            damage: 10,
                        };
                        spawnParticles(this.skillProjectile.x, this.skillProjectile.y, 10, '#00ff88', 4, 0.5, 'trail', 3);
                    }
                }

                useUltimate() {
                    if (this.hitStun > 0) return;
                    if (this.ultimateCooldown > 0) return;
                    if (this.energy < 50) return;
                    if (this.state === 'attack' || this.state === 'skill' || this.state === 'ultimate') return;
                    if (this.state === 'hit' || this.state === 'knocked') return;
                    this.state = 'ultimate';
                    this.stateTimer = 0.7;
                    this.attackFrame = 0;
                    this.attackDuration = 0.7;
                    this.attackHit = false;
                    this.energy -= 50;
                    this.ultimateCooldown = 4;
                    this.specialEffectTimer = 0.65;
                    this.invincible = 0.35;

                    const name = this.charData.name;
                    if (name.includes('優')) {
                        spawnParticles(this.x, this.y, 25, '#e8e8e8', 8, 0.6, 'trail', 2);
                        this.vx = this.facingRight ? 400 : -400;
                    } else if (name.includes('里奧')) {
                        spawnParticles(this.x, this.y - 30, 30, '#ff0000', 10, 0.7, 'spark', 4);
                        this.vx = this.facingRight ? 250 : -250;
                    } else if (name.includes('櫻')) {
                        spawnParticles(this.x, this.y - 20, 20, '#4dc9f6', 6, 0.8, 'circle', 5);
                    } else if (name.includes('健')) {
                        spawnParticles(this.x, this.y - 40, 20, '#ffd700', 7, 0.6, 'spark', 3);
                    } else if (name.includes('龍')) {
                        spawnParticles(this.x, this.y, 35, '#00ff88', 9, 0.8, 'trail', 3);
                    }
                }

                takeDamage(dmg, knockbackX, knockbackY, attacker) {
                    if (this.invincible > 0) return;
                    this.hp = Math.max(0, this.hp - dmg);
                    this.state = 'hit';
                    this.stateTimer = 0.3;
                    this.hitStun = 0.3;
                    this.vx = knockbackX;
                    this.vy = knockbackY;
                    if (knockbackY < -100) this.grounded = false;
                    this.flashTimer = 0.2;
                    this.attackHit = false;
                    this.skillProjectile = null;
                    globalSlowMo = Math.max(globalSlowMo, 0.08);
                    shakeAmount = Math.max(shakeAmount, dmg * 0.5);
                    this.energy = Math.min(this.maxEnergy, this.energy + dmg * 0.6);

                    if (attacker) {
                        attacker.comboCount++;
                        attacker.lastHitTime = performance.now() / 1000;
                        attacker.energy = Math.min(attacker.maxEnergy, attacker.energy + dmg * 0.3);
                    }

                    spawnHitSparks(this.x, this.y - 30, Math.floor(dmg / 2), '#ffffff');
                    spawnParticles(this.x, this.y - 30, Math.floor(dmg), '#ffaa00', 5, 0.4, 'circle', 3);
                }

                draw(ctx) {
                    ctx.save();
                    const r = this.rect;
                    const flash = this.flashTimer > 0 && Math.floor(this.flashTimer * 30) % 2 === 0;

                    // 陰影
                    if (this.grounded) {
                        ctx.fillStyle = 'rgba(0,0,0,0.4)';
                        ctx.beginPath();
                        ctx.ellipse(this.x, H - 58, this.width / 2, 6, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // 殘影
                    for (const trail of this.afterimageTrails) {
                        ctx.save();
                        ctx.globalAlpha = trail.alpha * 0.4;
                        this.drawBody(ctx, trail.x, trail.y, this.facingRight, flash, true);
                        ctx.restore();
                    }

                    // 主體
                    this.drawBody(ctx, this.x, this.y, this.facingRight, flash, false);

                    // 特殊效果光環
                    if (this.specialEffectTimer > 0 && this.state === 'skill') {
                        const alpha = this.specialEffectTimer * 2;
                        ctx.strokeStyle = this.charData.accent;
                        ctx.globalAlpha = Math.min(1, alpha);
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y - this.height / 2, this.width * 0.8, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    if (this.specialEffectTimer > 0 && this.state === 'ultimate') {
                        const alpha = this.specialEffectTimer * 2;
                        ctx.strokeStyle = this.charData.accent;
                        ctx.globalAlpha = Math.min(1, alpha);
                        ctx.lineWidth = 6;
                        ctx.setLineDash([8, 4]);
                        ctx.beginPath();
                        ctx.arc(this.x, this.y - this.height / 2, this.width * 1.2 + Math.sin(performance.now() / 80) * 15,
                            0, Math.PI * 2);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }

                    // 飛行道具
                    if (this.skillProjectile) {
                        const p = this.skillProjectile;
                        ctx.fillStyle = p.color;
                        ctx.shadowColor = p.color;
                        ctx.shadowBlur = 15;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // 拖尾
                        ctx.fillStyle = 'rgba(255,255,255,0.6)';
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // 無敵閃爍
                    if (this.invincible > 0 && Math.floor(this.invincible * 40) % 2 === 0) {
                        ctx.globalAlpha = 0.4;
                        this.drawBody(ctx, this.x, this.y, this.facingRight, true, true);
                        ctx.globalAlpha = 1;
                    }

                    ctx.restore();
                }

                drawBody(ctx, cx, cy, facingRight, flash, isGhost) {
                    const r = {
                        x: cx - this.width / 2,
                        y: cy - this.height,
                        w: this.width,
                        h: this.height,
                    };
                    const accent = this.charData.accent;
                    const baseColor = flash ? '#ffffff' : this.charData.color;

                    ctx.fillStyle = isGhost ? 'rgba(200,200,200,0.5)' : baseColor;

                    // 腿部
                    ctx.fillRect(r.x + r.w * 0.25, r.y + r.h * 0.7, r.w * 0.22, r.h * 0.3);
                    ctx.fillRect(r.x + r.w * 0.53, r.y + r.h * 0.7, r.w * 0.22, r.h * 0.3);

                    // 身體
                    ctx.fillRect(r.x + r.w * 0.1, r.y + r.h * 0.2, r.w * 0.8, r.h * 0.5);

                    // 頭部
                    ctx.fillStyle = isGhost ? 'rgba(220,200,180,0.5)' : '#e8c8a0';
                    ctx.beginPath();
                    ctx.arc(cx, r.y + r.h * 0.15, r.w * 0.35, 0, Math.PI * 2);
                    ctx.fill();

                    // 裝飾/特徵
                    if (!isGhost) {
                        ctx.fillStyle = accent;
                        // 護額或頭帶
                        ctx.fillRect(r.x + r.w * 0.05, r.y + r.h * 0.08, r.w * 0.9, 5);
                        // 腰帶
                        ctx.fillRect(r.x + r.w * 0.08, r.y + r.h * 0.55, r.w * 0.84, 6);
                    }

                    // 拳頭（攻擊時伸出）
                    if (this.state === 'attack' && this.attackFrame > 0.05 && this.attackFrame < 0.2) {
                        ctx.fillStyle = isGhost ? 'rgba(255,200,150,0.5)' : '#e8c8a0';
                        const fx = facingRight ? r.x + r.w + 8 : r.x - 8;
                        ctx.beginPath();
                        ctx.arc(fx, r.y + r.h * 0.45, 10, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // --- 遊戲變數 ---
            let fighter1 = null;
            let fighter2 = null;
            let selectionCursor1 = 0;
            let selectionCursor2 = 4;
            let selectConfirmed1 = false;
            let selectConfirmed2 = false;

            function createFighters() {
                const c1 = CHARACTERS[p1Selection];
                const c2 = CHARACTERS[p2Selection];
                fighter1 = new Fighter(200, H - 60, c1, true, false);
                fighter2 = new Fighter(W - 200, H - 60, c2, false, isVsCPU);
                fighter1.facingRight = true;
                fighter2.facingRight = false;
            }

            function resetRound() {
                fighter1.reset(200);
                fighter2.reset(W - 200);
                fighter1.facingRight = true;
                fighter2.facingRight = false;
                particles = [];
                roundEndTimer = 0;
                roundWinner = null;
                roundStartCountdown = 1.2;
                globalSlowMo = 0;
                shakeAmount = 0;
                fighter1.energy = 0;
                fighter2.energy = 0;
            }

            function checkRoundEnd() {
                if (roundWinner) return;
                if (fighter1.hp <= 0) {
                    roundWinner = 'p2';
                    p2RoundWins++;
                    roundEndTimer = 1.5;
                    globalSlowMo = 0.3;
                    spawnParticles(fighter1.x, fighter1.y - 30, 40, '#ff4444', 8, 0.8, 'spark', 4);
                } else if (fighter2.hp <= 0) {
                    roundWinner = 'p1';
                    p1RoundWins++;
                    roundEndTimer = 1.5;
                    globalSlowMo = 0.3;
                    spawnParticles(fighter2.x, fighter2.y - 30, 40, '#ff4444', 8, 0.8, 'spark', 4);
                }
                if (roundWinner) {
                    if (p1RoundWins >= 2) {
                        matchWinner = 'p1';
                        gameState = STATE.MATCH_END;
                        matchEndTimer = 3;
                    } else if (p2RoundWins >= 2) {
                        matchWinner = 'p2';
                        gameState = STATE.MATCH_END;
                        matchEndTimer = 3;
                    } else {
                        gameState = STATE.ROUND_END;
                        roundNumber++;
                    }
                }
            }

            function startNextRound() {
                gameState = STATE.FIGHT;
                roundWinner = null;
                resetRound();
            }

            function handleFighterInput(f, opponent, isP1) {
                if (f.hitStun > 0) return;
                if (f.state === 'hit' || f.state === 'knocked') return;
                if (f.state === 'attack' || f.state === 'skill' || f.state === 'ultimate') return;
                if (f.isCPU) return;

                const moveLeft = isP1 ? keys['a'] : keys['arrowleft'];
                const moveRight = isP1 ? keys['d'] : keys['arrowright'];
                const jumpKey = isP1 ? keys['w'] : keys['arrowup'];
                const attackKey = isP1 ? keys['j'] : keys['1'] || keys['numpad1'];
                const skillKey = isP1 ? keys['k'] : keys['2'] || keys['numpad2'];
                const ultimateKey = isP1 ? keys['l'] : keys['3'] || keys['numpad3'];
                const blockKey = isP1 ? keys['s'] : keys['arrowdown'];

                // 防禦
                if (blockKey && f.grounded && opponent.state === 'attack') {
                    f.state = 'idle';
                    f.vx *= 0.3;
                    return;
                }

                // 移動
                if (moveLeft && !moveRight) {
                    f.vx = -280;
                    f.facingRight = false;
                    if (f.state === 'idle') f.state = 'walk';
                } else if (moveRight && !moveLeft) {
                    f.vx = 280;
                    f.facingRight = true;
                    if (f.state === 'idle') f.state = 'walk';
                } else if (!moveLeft && !moveRight && f.state === 'walk') {
                    f.state = 'idle';
                }

                // 跳躍
                if (jumpKey && f.grounded) {
                    f.jump();
                }

                // 攻擊
                if (attackKey) {
                    f.attack();
                }

                // 技能
                if (skillKey && f.skillCooldown <= 0) {
                    f.useSkill();
                }

                // 必殺技
                if (ultimateKey && f.ultimateCooldown <= 0 && f.energy >= 50) {
                    f.useUltimate();
                }
            }

            function checkCollisions(f1, f2) {
                // f1 攻擊 f2
                if (f1.state === 'attack' && f1.attackFrame > 0.08 && f1.attackFrame < 0.25 && !f1.attackHit) {
                    if (rectsOverlap(f1.attackRect, f2.rect)) {
                        f1.attackHit = true;
                        const kbx = f1.facingRight ? 350 : -350;
                        f2.takeDamage(7, kbx, -120, f1);
                    }
                }

                // f1 技能命中 f2
                if (f1.state === 'skill' && f1.attackFrame > 0.06 && f1.attackFrame < 0.35 && !f1.attackHit) {
                    const sRect = f1.skillRect;
                    if (rectsOverlap(sRect, f2.rect)) {
                        f1.attackHit = true;
                        const kbx = f1.facingRight ? 450 : -450;
                        const name = f1.charData.name;
                        let dmg = 14;
                        if (name.includes('櫻')) dmg = 18; // 投技傷害更高
                        if (name.includes('里奧')) dmg = 16;
                        f2.takeDamage(dmg, kbx, -200, f1);
                        if (name.includes('櫻')) {
                            // 重力摔：砸地效果
                            spawnParticles(f2.x, H - 60, 20, '#4dc9f6', 6, 0.5, 'circle', 5);
                            shakeAmount = Math.max(shakeAmount, 8);
                        }
                    }
                }

                // f1 必殺技命中 f2
                if (f1.state === 'ultimate' && f1.attackFrame > 0.1 && f1.attackFrame < 0.5 && !f1.attackHit) {
                    const uRect = {
                        x: f1.rect.x - 30,
                        y: f1.rect.y - 20,
                        w: f1.rect.w + 60,
                        h: f1.rect.h + 40,
                    };
                    if (rectsOverlap(uRect, f2.rect)) {
                        f1.attackHit = true;
                        const kbx = f1.facingRight ? 550 : -550;
                        const name = f1.charData.name;
                        let dmg = 25;
                        if (name.includes('龍')) dmg = 30;
                        if (name.includes('健')) dmg = 27;
                        f2.takeDamage(dmg, kbx, -350, f1);
                        globalSlowMo = Math.max(globalSlowMo, 0.15);
                        shakeAmount = Math.max(shakeAmount, 12);
                        spawnParticles(f2.x, f2.y - 30, 30, '#ffffff', 10, 0.6, 'spark', 4);
                    }
                }

                // 飛行道具碰撞
                if (f1.skillProjectile && !f1.skillProjectile.hit) {
                    const p = f1.skillProjectile;
                    const pRect = { x: p.x - p.size, y: p.y - p.size, w: p.size * 2, h: p.size * 2 };
                    if (rectsOverlap(pRect, f2.rect)) {
                        f1.skillProjectile.hit = true;
                        f1.skillProjectile = null;
                        const kbx = p.vx > 0 ? 300 : -300;
                        f2.takeDamage(p.damage || 10, kbx, -100, f1);
                        spawnParticles(p.x, p.y, 15, p.color, 5, 0.4, 'circle', 3);
                    }
                }
            }

            function rectsOverlap(a, b) {
                return !(a.x + a.w < b.x || a.x > b.x + b.w || a.y + a.h < b.y || a.y > b.y + b.h);
            }

            // --- 繪製函數 ---
            function drawBackground() {
                // 漸層背景
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#0a0a20');
                grad.addColorStop(0.5, '#111133');
                grad.addColorStop(1, '#1a1a30');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                // 地面
                ctx.fillStyle = '#2a2a3a';
                ctx.fillRect(0, H - 55, W, 55);
                ctx.fillStyle = '#3a3a4a';
                ctx.fillRect(0, H - 55, W, 3);
                // 地面紋理
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                for (let i = 0; i < W; i += 60) {
                    ctx.beginPath();
                    ctx.moveTo(i, H - 55);
                    ctx.lineTo(i + 20, H);
                    ctx.stroke();
                }

                // 觀眾席陰影
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                for (let i = 0; i < 10; i++) {
                    ctx.beginPath();
                    ctx.arc(60 + i * 90, 20, 18, 0, Math.PI);
                    ctx.fill();
                }
            }

            function drawHUD() {
                if (!fighter1 || !fighter2) return;

                // P1 血條
                const barY1 = 16;
                const barW = 340;
                const barH = 22;
                const barX1 = 20;
                drawHealthBar(barX1, barY1, barW, barH, fighter1.hp, fighter1.maxHp, fighter1.charData.accent, true);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.fillText(fighter1.charData.name, barX1 + 8, barY1 - 6);

                // P1 能量
                const eBarH = 8;
                const eY1 = barY1 + barH + 4;
                drawEnergyBar(barX1, eY1, barW, eBarH, fighter1.energy, fighter1.maxEnergy, '#ffaa00');

                // P2 血條
                const barX2 = W - 20 - barW;
                const barY2 = 16;
                drawHealthBar(barX2, barY2, barW, barH, fighter2.hp, fighter2.maxHp, fighter2.charData.accent, false);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px "Segoe UI","Noto Sans TC",sans-serif';
                const nameW2 = ctx.measureText(fighter2.charData.name).width;
                ctx.fillText(fighter2.charData.name, barX2 + barW - nameW2 - 8, barY2 - 6);

                // P2 能量
                const eY2 = barY2 + barH + 4;
                drawEnergyBar(barX2, eY2, barW, eBarH, fighter2.energy, fighter2.maxEnergy, '#ffaa00');

                // 回合數
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`ROUND ${roundNumber}`, W / 2, barY1 + barH / 2 + 6);
                ctx.textAlign = 'start';

                // 計時器（假設99秒）
                ctx.fillStyle = '#ccc';
                ctx.font = 'bold 14px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('99', W / 2, barY1 + barH + 24);
                ctx.textAlign = 'start';

                // 技能冷卻指示
                if (fighter1.skillCooldown > 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.font = '10px "Segoe UI","Noto Sans TC",sans-serif';
                    ctx.fillText(`技能冷卻:${fighter1.skillCooldown.toFixed(1)}s`, barX1, eY1 + 14);
                }
                if (fighter2.skillCooldown > 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.font = '10px "Segoe UI","Noto Sans TC",sans-serif';
                    ctx.textAlign = 'right';
                    ctx.fillText(`技能冷卻:${fighter2.skillCooldown.toFixed(1)}s`, barX2 + barW, eY2 + 14);
                    ctx.textAlign = 'start';
                }
            }

            function drawHealthBar(x, y, w, h, hp, maxHp, accent, leftAligned) {
                // 背景
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);

                // 血量
                const ratio = hp / maxHp;
                const hpW = w * ratio;
                const grad = ctx.createLinearGradient(x, y, x + w, y);
                if (ratio > 0.5) {
                    grad.addColorStop(0, '#44cc44');
                    grad.addColorStop(1, accent);
                } else if (ratio > 0.25) {
                    grad.addColorStop(0, '#ccaa00');
                    grad.addColorStop(1, '#ff8800');
                } else {
                    grad.addColorStop(0, '#cc3333');
                    grad.addColorStop(1, '#ff0000');
                }
                ctx.fillStyle = grad;
                if (leftAligned) {
                    ctx.fillRect(x, y, hpW, h);
                } else {
                    ctx.fillRect(x + w - hpW, y, hpW, h);
                }

                // 光澤
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                if (leftAligned) {
                    ctx.fillRect(x, y, hpW, h / 2);
                } else {
                    ctx.fillRect(x + w - hpW, y, hpW, h / 2);
                }

                // HP數字
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 13px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`${Math.ceil(hp)}`, x + w / 2, y + h / 2 + 5);
                ctx.textAlign = 'start';
            }

            function drawEnergyBar(x, y, w, h, energy, maxEnergy, color) {
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, w, h);
                const ratio = energy / maxEnergy;
                ctx.fillStyle = color;
                ctx.fillRect(x, y, w * ratio, h);
                // 分段線
                for (let i = 1; i < 3; i++) {
                    const sx = x + w * (i / 3);
                    ctx.strokeStyle = '#333';
                    ctx.beginPath();
                    ctx.moveTo(sx, y);
                    ctx.lineTo(sx, y + h);
                    ctx.stroke();
                }
            }

            function drawSelectScreen() {
                drawBackground();
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = '#e2b04a';
                ctx.font = 'bold 28px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('選擇你的戰士', W / 2, 50);

                const modeText = isVsCPU ? '🆚 單人 vs 電腦 (點擊下方切換)' : '🆚 雙人對戰模式';
                ctx.fillStyle = '#aaa';
                ctx.font = '14px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.fillText(modeText, W / 2, 78);
                ctx.textAlign = 'start';

                const cardW = 150;
                const cardH = 180;
                const startX = (W - cardW * 5 - 40 * 4) / 2;
                const cardY = 105;

                for (let i = 0; i < CHARACTERS.length; i++) {
                    const cx = startX + i * (cardW + 40);
                    const ch = CHARACTERS[i];
                    const isSelected1 = i === selectionCursor1;
                    const isSelected2 = i === selectionCursor2;
                    const isHovered = isSelected1 || isSelected2;

                    // 卡片背景
                    ctx.fillStyle = isHovered ? '#2a2a50' : '#1a1a30';
                    ctx.strokeStyle = isSelected1 ? '#ffcc00' : isSelected2 ? '#ff6644' : '#444';
                    ctx.lineWidth = isHovered ? 3 : 1;
                    ctx.beginPath();
                    ctx.roundRect(cx, cardY, cardW, cardH, 10);
                    ctx.fill();
                    ctx.stroke();

                    // 角色預覽
                    const previewX = cx + cardW / 2;
                    const previewY = cardY + 55;
                    ctx.fillStyle = ch.color;
                    ctx.fillRect(previewX - 22, previewY - 45, 44, 70);
                    ctx.fillStyle = '#e8c8a0';
                    ctx.beginPath();
                    ctx.arc(previewX, previewY - 50, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = ch.accent;
                    ctx.fillRect(previewX - 20, previewY - 56, 40, 4);
                    ctx.fillRect(previewX - 18, previewY - 5, 36, 5);

                    // 名字
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px "Segoe UI","Noto Sans TC",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(ch.name, previewX, previewY + 30);

                    // 描述
                    ctx.fillStyle = '#aaa';
                    ctx.font = '10px "Segoe UI","Noto Sans TC",sans-serif';
                    ctx.fillText(ch.desc, previewX, previewY + 48);

                    // 選擇標記
                    if (isSelected1) {
                        ctx.fillStyle = '#ffcc00';
                        ctx.font = 'bold 14px "Segoe UI","Noto Sans TC",sans-serif';
                        ctx.fillText('▲ P1 ▲', previewX, previewY + 68);
                    }
                    if (isSelected2) {
                        ctx.fillStyle = '#ff6644';
                        ctx.font = 'bold 14px "Segoe UI","Noto Sans TC",sans-serif';
                        ctx.fillText('▼ P2 ▼', previewX, previewY + (isSelected1 ? 84 : 68));
                    }
                    ctx.textAlign = 'start';
                }

                // 提示
                ctx.fillStyle = '#ccc';
                ctx.font = '13px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('P1: A/D 選擇 | W 確認 | P2: ←→ 選擇 | ↑ 確認', W / 2, cardY + cardH + 30);
                ctx.fillText('按 Enter 開始戰鬥！', W / 2, cardY + cardH + 55);
                ctx.textAlign = 'start';
            }

            function drawRoundEndOverlay() {
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.textAlign = 'center';
                const winnerName = roundWinner === 'p1' ? fighter1.charData.name : fighter2.charData.name;
                ctx.fillText(`${winnerName} 贏得此回合！`, W / 2, H / 2 - 10);
                ctx.fillStyle = '#e2b04a';
                ctx.font = 'bold 18px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.fillText('按 Enter 開始下一回合', W / 2, H / 2 + 35);
                ctx.textAlign = 'start';
            }

            function drawMatchEndOverlay() {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#e2b04a';
                ctx.font = 'bold 40px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.textAlign = 'center';
                const champName = matchWinner === 'p1' ? fighter1.charData.name : fighter2.charData.name;
                ctx.fillText(`🏆 ${champName} 獲得勝利！🏆`, W / 2, H / 2 - 15);
                ctx.fillStyle = '#fff';
                ctx.font = '16px "Segoe UI","Noto Sans TC",sans-serif';
                ctx.fillText('按 Enter 重新開始', W / 2, H / 2 + 30);
                ctx.textAlign = 'start';
            }

            function updateRoundIndicator() {
                const p1r1 = document.getElementById('p1r1');
                const p1r2 = document.getElementById('p1r2');
                const p2r1 = document.getElementById('p2r1');
                const p2r2 = document.getElementById('p2r2');
                [p1r1, p1r2, p2r1, p2r2].forEach(d => d.className = 'round-dot');
                if (p1RoundWins >= 1) p1r1.classList.add('won');
                if (p1RoundWins >= 2) p1r2.classList.add('won');
                if (p2RoundWins >= 1) p2r1.classList.add('lost');
                if (p2RoundWins >= 2) p2r2.classList.add('lost');
                // 從P2角度看
                if (p2RoundWins >= 1) document.getElementById('p2r1').classList.add('lost');
                if (p2RoundWins >= 2) document.getElementById('p2r2').classList.add('lost');
                // 重新整理
                [p1r1, p1r2].forEach((d, i) => {
                    d.className = 'round-dot';
                    if (i < p1RoundWins) d.classList.add('won');
                });
                [p2r1, p2r2].forEach((d, i) => {
                    d.className = 'round-dot';
                    if (i < p2RoundWins) d.classList.add('lost');
                });
            }

            // --- 主循環 ---
            let lastTime = performance.now();

            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt > 0.1) dt = 0.1; // 防止大幀跳
                if (dt <= 0) dt = 0.016;
                lastTime = timestamp;

                ctx.clearRect(0, 0, W, H);

                // 震動偏移
                let shakeX = 0,
                    shakeY = 0;
                if (shakeAmount > 0) {
                    shakeX = (Math.random() - 0.5) * shakeAmount;
                    shakeY = (Math.random() - 0.5) * shakeAmount;
                }
                ctx.save();
                ctx.translate(shakeX, shakeY);

                if (gameState === STATE.SELECT) {
                    drawSelectScreen();
                    handleSelectInput();
                } else if (gameState === STATE.FIGHT) {
                    drawBackground();
                    if (fighter1 && fighter2) {
                        // 倒數
                        if (roundStartCountdown > 0) {
                            roundStartCountdown -= dt;
                            ctx.fillStyle = 'rgba(0,0,0,0.5)';
                            ctx.fillRect(0, 0, W, H);
                            ctx.fillStyle = '#fff';
                            ctx.font = 'bold 60px "Segoe UI","Noto Sans TC",sans-serif';
                            ctx.textAlign = 'center';
                            const cd = Math.ceil(roundStartCountdown);
                            ctx.fillText(cd > 0 ? (cd === 1 ? 'FIGHT!' : String(cd)) : 'FIGHT!', W / 2, H / 2);
                            ctx.textAlign = 'start';
                        }

                        handleFighterInput(fighter1, fighter2, true);
                        handleFighterInput(fighter2, fighter1, false);
                        fighter1.update(dt, fighter2);
                        fighter2.update(dt, fighter1);
                        checkCollisions(fighter1, fighter2);
                        checkCollisions(fighter2, fighter1);
                        checkRoundEnd();

                        // 更新粒子
                        for (const p of particles) p.update(dt);
                        particles = particles.filter(p => p.alive);

                        // 繪製
                        fighter1.draw(ctx);
                        fighter2.draw(ctx);
                        for (const p of particles) p.draw(ctx);
                        drawHUD();
                    }
                } else if (gameState === STATE.ROUND_END) {
                    drawBackground();
                    if (fighter1 && fighter2) {
                        for (const p of particles) p.update(dt);
                        particles = particles.filter(p => p.alive);
                        fighter1.draw(ctx);
                        fighter2.draw(ctx);
                        for (const p of particles) p.draw(ctx);
                        drawHUD();
                    }
                    drawRoundEndOverlay();
                    if (keys['enter']) {
                        keys['enter'] = false;
                        startNextRound();
                    }
                } else if (gameState === STATE.MATCH_END) {
                    drawBackground();
                    if (fighter1 && fighter2) {
                        for (const p of particles) p.update(dt);
                        particles = particles.filter(p => p.alive);
                        fighter1.draw(ctx);
                        fighter2.draw(ctx);
                        for (const p of particles) p.draw(ctx);
                        drawHUD();
                    }
                    drawMatchEndOverlay();
                    matchEndTimer -= dt;
                    if (keys['enter'] && matchEndTimer <= 2.5) {
                        keys['enter'] = false;
                        resetMatch();
                    }
                }

                ctx.restore();
                updateRoundIndicator();
                requestAnimationFrame(gameLoop);
            }

            function handleSelectInput() {
                // P1 選擇
                if (keys['a'] && !keys._prevA) {
                    selectionCursor1 = (selectionCursor1 - 1 + CHARACTERS.length) % CHARACTERS.length;
                }
                if (keys['d'] && !keys._prevD) {
                    selectionCursor1 = (selectionCursor1 + 1) % CHARACTERS.length;
                }
                if (keys['w'] && !keys._prevW) {
                    selectConfirmed1 = true;
                    p1Selection = selectionCursor1;
                }
                // P2 選擇
                if (keys['arrowleft'] && !keys._prevAL) {
                    selectionCursor2 = (selectionCursor2 - 1 + CHARACTERS.length) % CHARACTERS.length;
                }
                if (keys['arrowright'] && !keys._prevAR) {
                    selectionCursor2 = (selectionCursor2 + 1) % CHARACTERS.length;
                }
                if (keys['arrowup'] && !keys._prevAU) {
                    selectConfirmed2 = true;
                    p2Selection = selectionCursor2;
                }
                // CPU自動選擇
                if (isVsCPU && !selectConfirmed2) {
                    if (!keys._cpuSelected) {
                        selectionCursor2 = Math.floor(Math.random() * CHARACTERS.length);
                        p2Selection = selectionCursor2;
                        selectConfirmed2 = true;
                        keys._cpuSelected = true;
                    }
                }
                if (!isVsCPU) keys._cpuSelected = false;

                // 開始
                if (keys['enter'] && selectConfirmed1 && selectConfirmed2) {
                    keys['enter'] = false;
                    startGame();
                }

                // 記錄鍵狀態
                keys._prevA = keys['a'];
                keys._prevD = keys['d'];
                keys._prevW = keys['w'];
                keys._prevAL = keys['arrowleft'];
                keys._prevAR = keys['arrowright'];
                keys._prevAU = keys['arrowup'];
            }

            function startGame() {
                gameState = STATE.FIGHT;
                roundNumber = 1;
                p1RoundWins = 0;
                p2RoundWins = 0;
                roundWinner = null;
                matchWinner = null;
                createFighters();
                resetRound();
                updateRoundIndicator();
            }

            function resetMatch() {
                gameState = STATE.SELECT;
                p1Selection = -1;
                p2Selection = -1;
                selectConfirmed1 = false;
                selectConfirmed2 = false;
                selectionCursor1 = 0;
                selectionCursor2 = 4;
                roundNumber = 1;
                p1RoundWins = 0;
                p2RoundWins = 0;
                roundWinner = null;
                matchWinner = null;
                fighter1 = null;
                fighter2 = null;
                particles = [];
                globalSlowMo = 0;
                shakeAmount = 0;
                keys._cpuSelected = false;
                updateRoundIndicator();
                document.getElementById('p1r1').className = 'round-dot';
                document.getElementById('p1r2').className = 'round-dot';
                document.getElementById('p2r1').className = 'round-dot';
                document.getElementById('p2r2').className = 'round-dot';
            }

            // --- 模式切換 ---
            const modeToggle = document.getElementById('modeToggle');
            modeToggle.addEventListener('click', () => {
                if (gameState === STATE.SELECT) {
                    isVsCPU = !isVsCPU;
                    modeToggle.textContent = isVsCPU ? '🆚 單人 vs 電腦' : '🆚 雙人對戰模式';
                    selectConfirmed2 = false;
                    p2Selection = -1;
                    keys._cpuSelected = false;
                    if (isVsCPU) {
                        selectionCursor2 = Math.floor(Math.random() * CHARACTERS.length);
                    }
                }
            });

            // --- 初始化 ---
            updateRoundIndicator();
            if (isVsCPU) {
                selectionCursor2 = Math.floor(Math.random() * CHARACTERS.length);
            }
            requestAnimationFrame(gameLoop);

            // --- 響應式Canvas點擊處理 ---
            canvas.addEventListener('click', (e) => {
                if (gameState === STATE.SELECT && isVsCPU && !selectConfirmed2) {
                    selectionCursor2 = Math.floor(Math.random() * CHARACTERS.length);
                    p2Selection = selectionCursor2;
                    selectConfirmed2 = true;
                    keys._cpuSelected = true;
                }
            });

            console.log('⚔ 2D格鬥遊戲已就緒！');
            console.log('P1: WASD移動 | J攻擊 | K技能 | L必殺技');
            console.log('P2: ↑↓←→移動 | 1攻擊 | 2技能 | 3必殺技');
            console.log('模式: ' + (isVsCPU ? '單人vs電腦' : '雙人對戰'));
            console.log('角色: ' + CHARACTERS.map(c => c.name).join(' | '));
            console.log('規則: 1v1 三戰兩勝');
        })();
    </script>
</body>
</html>
